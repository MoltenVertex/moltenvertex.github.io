<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>train.xml Editor — OpenBVE</title>
  <script src="https://cdn.jsdelivr.net/npm/blockly/blockly.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f0f0f0;
      --sign-white: #ffffff;
      --fg: #1a1a1a;
      --fg-secondary: #444;
      --muted: #999;
      --border: #d4d4d4;
      --border-dark: #bbb;
      --red: #D71920;
      --blue: #00A1E9;
      --green: #009944;
      --orange: #F39700;
      --purple: #9C7DB8;
      --teal: #00A7A7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }


    .top-bar {
      background: var(--red);
      color: #fff;
      padding: 5px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
      animation: fadeDown 0.5s ease both;
    }

    .top-bar .train-icon {
      width: 14px;
      height: 14px;
      fill: #fff;
    }

    .top-bar .meta {
      margin-left: auto;
      font-weight: 500;
      letter-spacing: 1px;
      opacity: 0.85;
    }

    /* Station name board */
    .name-board {
      background: var(--sign-white);
      border-bottom: 3px solid var(--fg);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      animation: fadeDown 0.5s ease 0.05s both;
    }

    .station-medallion {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .station-medallion .letter {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .station-medallion .number {
      font-size: 20px;
      font-weight: 800;
      font-family: 'Noto Sans JP', sans-serif;
      margin-top: 1px;
    }

    .name-board .title-group {
      flex: 1;
      min-width: 0;
    }

    .name-board h1 {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      font-size: clamp(22px, 3.5vw, 30px);
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1.1;
      color: var(--fg);
    }

    .name-board .subtitle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    .name-board .toolbar {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toolbar button {
      background: var(--sign-white);
      color: var(--fg);
      border: 2px solid var(--border);
      padding: 6px 13px;
      border-radius: 0;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .toolbar button:hover {
      border-color: var(--border-dark);
      background: #fafafa;
    }

    .toolbar button.primary {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .toolbar button.primary:hover {
      background: #bf151b;
      border-color: #bf151b;
    }

    .toolbar button.danger {
      color: var(--red);
      border-color: var(--border);
    }

    .toolbar button.danger:hover {
      border-color: var(--red);
      background: #fff5f5;
    }

    /* Direction bar */
    .direction-bar {
      background: var(--sign-white);
      border-bottom: 1px solid var(--border);
      padding: 7px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--fg-secondary);
      flex-shrink: 0;
      animation: fadeDown 0.5s ease 0.1s both;
    }

    .direction-bar .arrow {
      font-weight: 700;
      color: var(--red);
      font-size: 14px;
    }

    .direction-bar .label {
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 11px;
    }

    .direction-bar .dest {
      color: var(--fg-secondary);
    }

    .direction-bar .line-stripe {
      width: 4px;
      height: 16px;
      background: var(--blue);
      margin-right: 4px;
    }

    /* === Main split  */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #blocklyContainer {
      flex: 1;
      position: relative;
      min-width: 0;
      background: var(--bg);
    }

    #blocklyDiv {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #blocklyDiv .blocklyToolboxDiv {
      background: var(--sign-white);
      border-right: 2px solid var(--border);
    }

    #blocklyDiv .blocklyTreeRow {
      border-bottom: 1px solid #eee;
    }

    #blocklyDiv .blocklyTreeRow:hover {
      background: #fafafa;
    }

    #blocklyDiv .blocklyTreeLabel {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    /*  Resizer  */
    .resizer {
      width: 2px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .resizer:hover {
      background: var(--red);
    }

    /*  Output panel — departure board style  */
    #outputPanel {
      width: 40%;
      min-width: 300px;
      background: var(--sign-white);
      display: flex;
      flex-direction: column;
      border-left: 2px solid var(--fg);
    }

    #outputPanel .panel-header {
      padding: 9px 14px;
      background: var(--fg);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #outputPanel .panel-header .line-badge {
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 2px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    #outputPanel .panel-header .panel-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
    }

    #outputPanel .panel-header .actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    #outputPanel .panel-header .actions button {
      background: transparent;
      color: #fff;
      border: 1px solid #555;
      padding: 3px 9px;
      border-radius: 0;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s, color 0.15s;
    }

    #outputPanel .panel-header .actions button:hover {
      border-color: var(--red);
      color: var(--red);
    }

    #xmlOutput {
      flex: 1;
      overflow: auto;
      padding: 12px 16px;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 11.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--fg);
      background: var(--sign-white);
      border-bottom: 1px solid var(--border);
    }

    #xmlOutput .xml-tag {
      color: var(--red);
      font-weight: 500;
    }

    #xmlOutput .xml-attr {
      color: var(--blue);
    }

    #xmlOutput .xml-comment {
      color: var(--muted);
      font-style: italic;
    }

    #xmlOutput .xml-decl {
      color: var(--muted);
    }

    #statusBar {
      background: var(--sign-white);
      color: var(--fg-secondary);
      padding: 5px 16px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    #statusBar::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 12px;
      background: var(--green);
      flex-shrink: 0;
    }

    #statusBar .error::before {
      background: var(--red);
    }

    #statusBar #statusText.error {
      color: var(--red);
    }

    #statusBar #statusText.ok {
      color: var(--green);
    }

    #statusBar #blockCount {
      margin-left: auto;
      color: var(--muted);
      font-weight: 500;
    }

    /*  Modal  */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(26, 26, 26, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    .modal-content {
      background: var(--sign-white);
      border: 3px solid var(--fg);
      padding: 20px 24px;
      border-radius: 0;
      max-width: 460px;
      width: 90%;
      color: var(--fg);
    }

    .modal-content h3 {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--red);
    }

    .modal-content p {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
      color: var(--fg-secondary);
    }

    .modal-content button {
      background: var(--fg);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }

    .modal-content button:hover {
      background: var(--red);
    }

    /*  Animations  */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /*  Responsive  */
    @media (max-width: 860px) {
      .name-board {
        flex-wrap: wrap;
        gap: 10px;
      }

      .name-board .toolbar {
        width: 100%;
        justify-content: flex-start;
      }

      .toolbar button {
        padding: 5px 10px;
        font-size: 10px;
      }
    }

    @media (max-width: 768px) {
      main {
        flex-direction: column;
      }

      #outputPanel {
        width: 100%;
        min-width: 0;
        height: 42%;
        border-left: none;
        border-top: 2px solid var(--fg);
      }

      .resizer {
        display: none;
      }

      .station-medallion {
        width: 40px;
        height: 40px;
      }

      .station-medallion .number {
        font-size: 16px;
      }
    }

    /*  Blockly overrides  */
    .blocklyFlyoutBackground {
      fill: var(--sign-white) !important;
    }

    .blocklyFlyoutButton {
      fill: var(--sign-white) !important;
    }

    .blocklyFlyoutLabelText {
      font-family: 'Inter', sans-serif !important;
      font-weight: 700 !important;
    }

    .blocklyTooltipDiv {
      border: 2px solid var(--fg) !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 11px !important;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <svg class="train-icon" viewBox="0 0 24 24">
      <path
        d="M12 2C8 2 6 4 6 8v8c0 2 1 3 3 3l-1 3h2l1-2h2l1 2h2l-1-3c2 0 3-1 3-3V8c0-4-2-6-6-6zm-3 5h6v3H9V7zm0 5h6v2H9v-2z" />
    </svg>
    <span>OpenBVE train.xml Editor</span>
    <span class="meta">Blockly Visual Programming</span>
  </div>

  <div class="name-board">
    <div class="station-medallion">
      <span class="letter">T</span>
      <span class="number">01</span>
    </div>
    <div class="title-group">
      <h1>train.xml</h1>
      <div class="subtitle">Visual Configuration Editor</div>
    </div>
    <div class="toolbar">
      <button id="sampleBtn" title="Load a sample train configuration">Sample</button>
      <button id="importBtn" title="Import an existing train.xml file">Import</button>
      <button id="copyBtn" title="Copy XML to clipboard">Copy</button>
      <button id="clearBtn" class="danger" title="Clear the workspace">Clear</button>
      <button id="exportBtn" class="primary" title="Download the generated train.xml">Download</button>
      <input type="file" id="fileInput" accept=".xml,text/xml" style="display:none">
    </div>
  </div>

  <div class="direction-bar">
    <span class="line-stripe"></span>
    <span class="arrow">→</span>
    <span class="label">for</span>
    <span class="dest">Import / Export / Edit train.xml configuration files</span>
  </div>

  <main>
    <div id="blocklyContainer">
      <div id="blocklyDiv"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div id="outputPanel">
      <div class="panel-header">
        <span class="line-badge">XML</span>
        <span class="panel-title">Generated Output</span>
        <div class="actions">
          <button id="copyBtn2">Copy</button>
          <button id="downloadBtn2">Download</button>
        </div>
      </div>
      <pre id="xmlOutput"></pre>
      <div id="statusBar">
        <span id="statusText">Ready</span>
        <span id="blockCount"></span>
      </div>
    </div>
  </main>

  <div class="modal" id="errorModal">
    <div class="modal-content">
      <h3 id="errorTitle">Error</h3>
      <p id="errorMessage"></p>
      <button onclick="document.getElementById('errorModal').classList.remove('show')">OK</button>
    </div>
  </div>

  <xml id="toolbox" style="display:none">
    <category name="Train" colour="#D71920">
      <block type="train_root"></block>
    </category>
    <category name="Cars &amp; Couplers" colour="#00A1E9">
      <block type="car"></block>
      <block type="coupler"></block>
    </category>
    <category name="Car Properties" colour="#00A7A7">
      <block type="camera_restriction"></block>
      <block type="car_length"></block>
      <block type="car_width"></block>
      <block type="car_height"></block>
      <block type="car_mass"></block>
      <block type="car_axles"></block>
      <block type="car_center_of_gravity"></block>
      <block type="car_frontal_area"></block>
      <block type="car_reversed"></block>
      <block type="car_motor_car"></block>
      <block type="car_visible_interior"></block>
      <block type="car_loading_sway"></block>
      <block type="car_object"></block>
      <block type="car_interior_view"></block>
      <block type="car_driver_position"></block>
      <block type="car_cargo"></block>
    </category>
    <category name="Power" colour="#F39700">
      <block type="power"></block>
      <block type="acceleration_curve"></block>
      <block type="power_handle"></block>
    </category>
    <category name="Brake" colour="#D71920">
      <block type="brake"></block>
      <block type="brake_compressor"></block>
      <block type="brake_main_reservoir"></block>
      <block type="brake_aux_reservoir"></block>
      <block type="brake_equal_reservoir"></block>
      <block type="brake_pipe"></block>
      <block type="brake_straight_pipe"></block>
      <block type="brake_cylinder"></block>
      <block type="brake_handle"></block>
    </category>
    <category name="Electric Engine" colour="#009944">
      <block type="electric_engine"></block>
      <block type="traction_motor"></block>
      <block type="regenerative_traction_motor"></block>
    </category>
    <category name="Other Sections" colour="#9C7DB8">
      <block type="doors"></block>
      <block type="sanders"></block>
      <block type="windscreen"></block>
      <block type="particle_source"></block>
      <block type="driver_supervision_device"></block>
    </category>
    <category name="Train Properties" colour="#00A7A7">
      <block type="plugin"></block>
      <block type="notch_descriptions"></block>
      <block type="driver_body"></block>
    </category>
  </xml>

  <script>
    'use strict';

    // Field & XML Helper Functions


    // Numeric field that allows empty values (so optional properties can be omitted)
    function numField(def, min, max) {
      return new Blockly.FieldTextInput(
        def !== undefined && def !== null ? String(def) : '',
        function (input) {
          if (input === null || input === '') return '';
          var n = Number(input);
          if (isNaN(n)) return null;
          if (min !== undefined && n < min) return null;
          if (max !== undefined && n > max) return null;
          return input;
        }
      );
    }

    function textField(def) {
      return new Blockly.FieldTextInput(def || '');
    }

    function checkboxField(def) {
      return new Blockly.FieldCheckbox(def ? 'TRUE' : 'FALSE');
    }

    function dropdownField(options) {
      return new Blockly.FieldDropdown(options);
    }

    // XML generation helpers
    function escapeXml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
    }

    function ind(n) { return '  '.repeat(n); }

    // Element generators - return XML string (or empty if value is empty)
    function numEl(tag, val, n) {
      if (val === null || val === undefined || val === '') return '';
      return ind(n) + '<' + tag + '>' + val + '</' + tag + '>\n';
    }

    function textEl(tag, val, n) {
      if (val === null || val === undefined || val === '') return '';
      return ind(n) + '<' + tag + '>' + escapeXml(val) + '</' + tag + '>\n';
    }

    function boolEl(tag, val, n) {
      if (val !== 'TRUE') return '';
      return ind(n) + '<' + tag + '>true</' + tag + '>\n';
    }

    function enumEl(tag, val, n) {
      if (val === null || val === undefined || val === '') return '';
      return ind(n) + '<' + tag + '>' + val + '</' + tag + '>\n';
    }

    function vec3El(tag, x, y, z, n) {
      if ((x === '' || x === null) && (y === '' || y === null) && (z === '' || z === null)) return '';
      var parts = [x || '', y || '', z || ''];
      return ind(n) + '<' + tag + '>' + parts.join(',') + '</' + tag + '>\n';
    }

    // XML parsing helpers
    function getChild(parent, tag) {
      if (!parent || !parent.children) return null;
      for (var i = 0; i < parent.children.length; i++) {
        if (parent.children[i].tagName === tag) return parent.children[i];
      }
      return null;
    }

    function getChildren(parent, tag) {
      var results = [];
      if (!parent || !parent.children) return results;
      for (var i = 0; i < parent.children.length; i++) {
        if (parent.children[i].tagName === tag) results.push(parent.children[i]);
      }
      return results;
    }

    function getText(parent, tag) {
      var el = getChild(parent, tag);
      return el ? el.textContent.trim() : '';
    }

    // Import field setters - clear field to empty if element is not present,
    // so only explicitly-set values are re-exported (clean round-trip).
    function setNum(block, field, parent, tag) {
      var el = getChild(parent, tag);
      block.setFieldValue(el ? el.textContent.trim() : '', field);
    }

    function setText(block, field, parent, tag) {
      var el = getChild(parent, tag);
      block.setFieldValue(el ? el.textContent.trim() : '', field);
    }

    function setBool(block, field, parent, tag) {
      var el = getChild(parent, tag);
      if (el) {
        var v = el.textContent.trim().toLowerCase();
        block.setFieldValue(v === 'true' || v === '1' ? 'TRUE' : 'FALSE', field);
      }
    }

    function setEnum(block, field, parent, tag) {
      var el = getChild(parent, tag);
      if (el) block.setFieldValue(el.textContent.trim(), field);
    }

    function setVec3(block, fx, fy, fz, parent, tag) {
      var el = getChild(parent, tag);
      if (el) {
        var parts = el.textContent.split(',').map(function (s) { return s.trim(); });
        block.setFieldValue(parts[0] || '', fx);
        block.setFieldValue(parts[1] || '', fy);
        block.setFieldValue(parts[2] || '', fz);
      } else {
        block.setFieldValue('', fx);
        block.setFieldValue('', fy);
        block.setFieldValue('', fz);
      }
    }

    // Append a block to the end of a statement-input stack
    function appendToStack(parentBlock, inputName, newBlock) {
      var input = parentBlock.getInput(inputName);
      if (!input || !input.connection) return;
      var existing = input.connection.targetBlock();
      if (existing) {
        var last = existing;
        while (last.getNextBlock()) last = last.getNextBlock();
        last.nextConnection.connect(newBlock.previousConnection);
      } else {
        input.connection.connect(newBlock.previousConnection);
      }
    }


    // Block Definitions


    //  Train Root

    // XML Generation (Export)


    function generateXml(block, n) {
      if (!block) return '';
      var xml = '';
      var ni = n + 1;

      switch (block.type) {
        case 'train_root':
          xml += '<?xml version="1.0" encoding="UTF-8"?>\n';
          xml += ind(n) + '<Train>\n';
          xml += numEl('DriverCar', block.getFieldValue('DRIVER_CAR'), ni);
          xml += textEl('Description', block.getFieldValue('DESCRIPTION'), ni);
          xml += numEl('HeadlightStates', block.getFieldValue('HEADLIGHT_STATES'), ni);
          // Cars and couplers (in order)
          var carBlock = block.getInputTargetBlock('CARS');
          while (carBlock) {
            xml += generateXml(carBlock, ni);
            carBlock = carBlock.getNextBlock();
          }
          var pluginBlock = block.getInputTargetBlock('PLUGIN');
          if (pluginBlock) xml += generateXml(pluginBlock, ni);
          var notchesBlock = block.getInputTargetBlock('NOTCHES');
          if (notchesBlock) xml += generateXml(notchesBlock, ni);
          var dbBlock = block.getInputTargetBlock('DRIVER_BODY');
          if (dbBlock) xml += generateXml(dbBlock, ni);
          xml += ind(n) + '</Train>\n';
          break;

        case 'car':
          var filePath = block.getFieldValue('FILE_PATH');
          if (filePath && filePath.trim() !== '') {
            xml += textEl('Car', filePath.trim(), n);
          } else {
            xml += ind(n) + '<Car>\n';
            // Camera restriction
            var crBlock = block.getInputTargetBlock('CAMERA_RESTRICTION');
            if (crBlock) xml += generateXml(crBlock, ni);
            // Modular properties
            var propBlock = block.getInputTargetBlock('PROPERTIES');
            while (propBlock) {
              xml += generateXml(propBlock, ni);
              propBlock = propBlock.getNextBlock();
            }
            // Sub-sections
            var powerBlock = block.getInputTargetBlock('POWER');
            if (powerBlock) xml += generateXml(powerBlock, ni);
            var brakeBlock = block.getInputTargetBlock('BRAKE');
            if (brakeBlock) xml += generateXml(brakeBlock, ni);
            var engineBlock = block.getInputTargetBlock('ENGINE');
            if (engineBlock) xml += generateXml(engineBlock, ni);
            var doorsBlock = block.getInputTargetBlock('DOORS');
            if (doorsBlock) xml += generateXml(doorsBlock, ni);
            var sandersBlock = block.getInputTargetBlock('SANDERS');
            if (sandersBlock) xml += generateXml(sandersBlock, ni);
            var windscreenBlock = block.getInputTargetBlock('WINDSCREEN');
            if (windscreenBlock) xml += generateXml(windscreenBlock, ni);
            var psBlock = block.getInputTargetBlock('PARTICLE_SOURCES');
            while (psBlock) {
              xml += generateXml(psBlock, ni);
              psBlock = psBlock.getNextBlock();
            }
            var dsdBlock = block.getInputTargetBlock('DSD');
            if (dsdBlock) xml += generateXml(dsdBlock, ni);
            xml += ind(n) + '</Car>\n';
          }
          break;

        case 'car_length':
          xml += numEl('Length', block.getFieldValue('VALUE'), n);
          break;
        case 'car_width':
          xml += numEl('Width', block.getFieldValue('VALUE'), n);
          break;
        case 'car_height':
          xml += numEl('Height', block.getFieldValue('VALUE'), n);
          break;
        case 'car_mass':
          xml += numEl('Mass', block.getFieldValue('VALUE'), n);
          break;
        case 'car_axles':
          xml += numEl('FrontAxle', block.getFieldValue('FRONT'), n);
          xml += numEl('RearAxle', block.getFieldValue('REAR'), n);
          break;
        case 'car_center_of_gravity':
          xml += numEl('CenterOfGravityHeight', block.getFieldValue('VALUE'), n);
          break;
        case 'car_frontal_area':
          xml += numEl('ExposedFrontalArea', block.getFieldValue('EXPOSED'), n);
          xml += numEl('UnexposedFrontalArea', block.getFieldValue('UNEXPOSED'), n);
          break;
        case 'car_reversed':
          xml += boolEl('Reversed', block.getFieldValue('VALUE'), n);
          break;
        case 'car_motor_car':
          xml += boolEl('MotorCar', block.getFieldValue('VALUE'), n);
          break;
        case 'car_visible_interior':
          xml += boolEl('VisibleFromInterior', block.getFieldValue('VALUE'), n);
          break;
        case 'car_loading_sway':
          xml += boolEl('LoadingSway', block.getFieldValue('VALUE'), n);
          break;
        case 'car_object':
          xml += textEl('Object', block.getFieldValue('VALUE'), n);
          break;
        case 'car_interior_view':
          xml += textEl('InteriorView', block.getFieldValue('OBJECT'), n);
          xml += vec3El('InteriorDirection', block.getFieldValue('DIR_X'),
            block.getFieldValue('DIR_Y'), block.getFieldValue('DIR_Z'), n);
          break;
        case 'car_driver_position':
          xml += vec3El('DriverPosition', block.getFieldValue('POS_X'),
            block.getFieldValue('POS_Y'), block.getFieldValue('POS_Z'), n);
          break;
        case 'car_cargo':
          xml += enumEl('Cargo', block.getFieldValue('VALUE'), n);
          break;

        case 'coupler':
          xml += ind(n) + '<Coupler>\n';
          xml += numEl('Minimum', block.getFieldValue('MINIMUM'), ni);
          xml += numEl('Maximum', block.getFieldValue('MAXIMUM'), ni);
          xml += textEl('Object', block.getFieldValue('OBJECT'), ni);
          xml += boolEl('CanUncouple', block.getFieldValue('CAN_UNCOUPLE'), ni);
          xml += ind(n) + '</Coupler>\n';
          break;

        case 'camera_restriction':
          xml += ind(n) + '<CameraRestriction>\n';
          xml += numEl('Backwards', block.getFieldValue('BACKWARDS'), ni);
          xml += numEl('Forwards', block.getFieldValue('FORWARDS'), ni);
          xml += numEl('Left', block.getFieldValue('LEFT'), ni);
          xml += numEl('Right', block.getFieldValue('RIGHT'), ni);
          xml += numEl('Down', block.getFieldValue('DOWN'), ni);
          xml += numEl('Up', block.getFieldValue('UP'), ni);
          xml += ind(n) + '</CameraRestriction>\n';
          break;

        case 'power':
          xml += ind(n) + '<Power>\n';
          var acBlock = block.getInputTargetBlock('ACCELERATION_CURVES');
          if (acBlock) {
            xml += ind(ni) + '<AccelerationCurves>\n';
            while (acBlock) {
              xml += generateXml(acBlock, ni + 1);
              acBlock = acBlock.getNextBlock();
            }
            xml += ind(ni) + '</AccelerationCurves>\n';
          }
          var phBlock = block.getInputTargetBlock('HANDLE');
          if (phBlock) xml += generateXml(phBlock, ni);
          xml += ind(n) + '</Power>\n';
          break;

        case 'acceleration_curve':
          xml += ind(n) + '<OpenBVE>\n';
          xml += numEl('StageZeroAcceleration', block.getFieldValue('STAGE_ZERO_ACCELERATION'), ni);
          xml += numEl('StageOneAcceleration', block.getFieldValue('STAGE_ONE_ACCELERATION'), ni);
          xml += numEl('StageOneSpeed', block.getFieldValue('STAGE_ONE_SPEED'), ni);
          xml += numEl('StageTwoExponent', block.getFieldValue('STAGE_TWO_EXPONENT'), ni);
          xml += numEl('StageTwoSpeed', block.getFieldValue('STAGE_TWO_SPEED'), ni);
          xml += numEl('Multiplier', block.getFieldValue('MULTIPLIER'), ni);
          xml += ind(n) + '</OpenBVE>\n';
          break;

        case 'power_handle':
          xml += ind(n) + '<Handle>\n';
          xml += numEl('Notches', block.getFieldValue('NOTCHES'), ni);
          xml += enumEl('SpringType', block.getFieldValue('SPRING_TYPE'), ni);
          xml += ind(n) + '</Handle>\n';
          break;

        case 'brake':
          xml += ind(n) + '<Brake>\n';
          var compBlock = block.getInputTargetBlock('COMPRESSOR');
          if (compBlock) xml += generateXml(compBlock, ni);
          var mrBlock = block.getInputTargetBlock('MAIN_RES');
          if (mrBlock) xml += generateXml(mrBlock, ni);
          var arBlock = block.getInputTargetBlock('AUX_RES');
          if (arBlock) xml += generateXml(arBlock, ni);
          var erBlock = block.getInputTargetBlock('EQUAL_RES');
          if (erBlock) xml += generateXml(erBlock, ni);
          var bpBlock = block.getInputTargetBlock('BRAKE_PIPE');
          if (bpBlock) xml += generateXml(bpBlock, ni);
          var spBlock = block.getInputTargetBlock('STRAIGHT_PIPE');
          if (spBlock) xml += generateXml(spBlock, ni);
          var bcBlock = block.getInputTargetBlock('BRAKE_CYLINDER');
          if (bcBlock) xml += generateXml(bcBlock, ni);
          var bhBlock = block.getInputTargetBlock('HANDLE');
          if (bhBlock) xml += generateXml(bhBlock, ni);
          xml += ind(n) + '</Brake>\n';
          break;

        case 'brake_compressor':
          xml += ind(n) + '<Compressor>\n';
          xml += numEl('Rate', block.getFieldValue('RATE'), ni);
          xml += ind(n) + '</Compressor>\n';
          break;

        case 'brake_main_reservoir':
          xml += ind(n) + '<MainReservoir>\n';
          xml += numEl('MinimumPressure', block.getFieldValue('MINIMUM_PRESSURE'), ni);
          xml += numEl('MaximumPressure', block.getFieldValue('MAXIMUM_PRESSURE'), ni);
          xml += ind(n) + '</MainReservoir>\n';
          break;

        case 'brake_aux_reservoir':
          xml += ind(n) + '<AuxiliaryReservoir>\n';
          xml += numEl('ChargeRate', block.getFieldValue('CHARGE_RATE'), ni);
          xml += ind(n) + '</AuxiliaryReservoir>\n';
          break;

        case 'brake_equal_reservoir':
          xml += ind(n) + '<EqualizingReservoir>\n';
          xml += numEl('NormalPressure', block.getFieldValue('NORMAL_PRESSURE'), ni);
          xml += ind(n) + '</EqualizingReservoir>\n';
          break;

        case 'brake_pipe':
          xml += ind(n) + '<BrakePipe>\n';
          xml += numEl('NormalPressure', block.getFieldValue('NORMAL_PRESSURE'), ni);
          xml += numEl('ChargeRate', block.getFieldValue('CHARGE_RATE'), ni);
          xml += numEl('ServiceRate', block.getFieldValue('SERVICE_RATE'), ni);
          xml += numEl('EmergencyRate', block.getFieldValue('EMERGENCY_RATE'), ni);
          xml += ind(n) + '</BrakePipe>\n';
          break;

        case 'brake_straight_pipe':
          xml += ind(n) + '<StraightAirPipe>\n';
          xml += numEl('ServiceRate', block.getFieldValue('SERVICE_RATE'), ni);
          xml += numEl('EmergencyRate', block.getFieldValue('EMERGENCY_RATE'), ni);
          xml += numEl('ReleaseRate', block.getFieldValue('RELEASE_RATE'), ni);
          xml += ind(n) + '</StraightAirPipe>\n';
          break;

        case 'brake_cylinder':
          xml += ind(n) + '<BrakeCylinder>\n';
          xml += numEl('ServiceMaximumPressure', block.getFieldValue('SERVICE_MAX_PRESSURE'), ni);
          xml += numEl('EmergencyMaximumPressure', block.getFieldValue('EMERGENCY_MAX_PRESSURE'), ni);
          xml += numEl('EmergencyRate', block.getFieldValue('EMERGENCY_RATE'), ni);
          xml += numEl('ReleaseRate', block.getFieldValue('RELEASE_RATE'), ni);
          xml += ind(n) + '</BrakeCylinder>\n';
          break;

        case 'brake_handle':
          xml += ind(n) + '<Handle>\n';
          xml += numEl('Notches', block.getFieldValue('NOTCHES'), ni);
          xml += enumEl('SpringType', block.getFieldValue('SPRING_TYPE'), ni);
          xml += numEl('MotorBrakeNotch', block.getFieldValue('MOTOR_BRAKE_NOTCH'), ni);
          xml += ind(n) + '</Handle>\n';
          break;

        case 'electric_engine':
          xml += ind(n) + '<ElectricEngine>\n';
          xml += boolEl('Pantograph', block.getFieldValue('PANTOGRAPH'), ni);
          xml += boolEl('CollectorShoe', block.getFieldValue('COLLECTOR_SHOE'), ni);
          var motorBlock = block.getInputTargetBlock('MOTORS');
          while (motorBlock) {
            xml += generateXml(motorBlock, ni);
            motorBlock = motorBlock.getNextBlock();
          }
          xml += ind(n) + '</ElectricEngine>\n';
          break;

        case 'traction_motor':
          xml += ind(n) + '<TractionMotor>\n';
          xml += numEl('MaxAmps', block.getFieldValue('MAX_AMPS'), ni);
          xml += ind(n) + '</TractionMotor>\n';
          break;

        case 'regenerative_traction_motor':
          xml += ind(n) + '<RegenerativeTractionMotor>\n';
          xml += numEl('MaxAmps', block.getFieldValue('MAX_AMPS'), ni);
          xml += numEl('MaxRegenerativeAmps', block.getFieldValue('MAX_REGEN_AMPS'), ni);
          xml += ind(n) + '</RegenerativeTractionMotor>\n';
          break;

        case 'doors':
          xml += ind(n) + '<Doors>\n';
          xml += numEl('OpenSpeed', block.getFieldValue('OPEN_SPEED'), ni);
          xml += numEl('CloseSpeed', block.getFieldValue('CLOSE_SPEED'), ni);
          xml += numEl('Width', block.getFieldValue('WIDTH'), ni);
          xml += numEl('Tolerance', block.getFieldValue('TOLERANCE'), ni);
          xml += ind(n) + '</Doors>\n';
          break;

        case 'sanders':
          xml += ind(n) + '<Sanders>\n';
          xml += enumEl('Type', block.getFieldValue('TYPE'), ni);
          xml += numEl('Rate', block.getFieldValue('RATE'), ni);
          xml += numEl('SandLevel', block.getFieldValue('SAND_LEVEL'), ni);
          xml += numEl('NumberOfShots', block.getFieldValue('NUMBER_OF_SHOTS'), ni);
          xml += numEl('ApplicationTime', block.getFieldValue('APPLICATION_TIME'), ni);
          xml += numEl('ActivationTime', block.getFieldValue('ACTIVATION_TIME'), ni);
          xml += ind(n) + '</Sanders>\n';
          break;

        case 'windscreen':
          xml += ind(n) + '<Windscreen>\n';
          xml += numEl('NumberOfDrops', block.getFieldValue('NUMBER_OF_DROPS'), ni);
          xml += numEl('WipeSpeed', block.getFieldValue('WIPE_SPEED'), ni);
          xml += numEl('HoldTime', block.getFieldValue('HOLD_TIME'), ni);
          xml += numEl('DropLife', block.getFieldValue('DROP_LIFE'), ni);
          xml += enumEl('RestPosition', block.getFieldValue('REST_POSITION'), ni);
          xml += enumEl('HoldPosition', block.getFieldValue('HOLD_POSITION'), ni);
          xml += ind(n) + '</Windscreen>\n';
          break;

        case 'particle_source':
          xml += ind(n) + '<ParticleSource>\n';
          xml += vec3El('Location', block.getFieldValue('LOC_X'), block.getFieldValue('LOC_Y'), block.getFieldValue('LOC_Z'), ni);
          xml += numEl('MaximumSize', block.getFieldValue('MAX_SIZE'), ni);
          xml += numEl('MaximumGrownSize', block.getFieldValue('MAX_GROWN_SIZE'), ni);
          xml += vec3El('InitialDirection', block.getFieldValue('DIR_X'), block.getFieldValue('DIR_Y'), block.getFieldValue('DIR_Z'), ni);
          xml += numEl('MaximumLifespan', block.getFieldValue('MAX_LIFESPAN'), ni);
          xml += textEl('Texture', block.getFieldValue('TEXTURE'), ni);
          xml += boolEl('EmitsAtIdle', block.getFieldValue('EMITS_AT_IDLE'), ni);
          xml += textEl('Function', block.getFieldValue('FUNCTION'), ni);
          xml += ind(n) + '</ParticleSource>\n';
          break;

        case 'driver_supervision_device':
          xml += ind(n) + '<DriverSupervisionDevice>\n';
          xml += enumEl('Type', block.getFieldValue('TYPE'), ni);
          xml += enumEl('Mode', block.getFieldValue('MODE'), ni);
          xml += numEl('AlarmTime', block.getFieldValue('ALARM_TIME'), ni);
          xml += numEl('InterventionTime', block.getFieldValue('INTERVENTION_TIME'), ni);
          xml += numEl('RequiredStopTime', block.getFieldValue('REQUIRED_STOP_TIME'), ni);
          xml += boolEl('LoopingAlert', block.getFieldValue('LOOPING_ALERT'), ni);
          xml += boolEl('LoopingAlarm', block.getFieldValue('LOOPING_ALARM'), ni);
          xml += ind(n) + '</DriverSupervisionDevice>\n';
          break;

        case 'plugin':
          // Plugin can be a simple string (path) or expanded form. We always use expanded form.
          var file = block.getFieldValue('FILE');
          var supportsAi = block.getFieldValue('SUPPORTS_AI');
          if (file && supportsAi !== 'TRUE') {
            // Simple string form
            xml += ind(n) + '<Plugin>' + escapeXml(file) + '</Plugin>\n';
          } else {
            xml += ind(n) + '<Plugin>\n';
            xml += textEl('File', file, ni);
            xml += boolEl('SupportsAI', supportsAi, ni);
            xml += ind(n) + '</Plugin>\n';
          }
          break;

        case 'notch_descriptions':
          xml += ind(n) + '<NotchDescriptions>\n';
          xml += textEl('Power', block.getFieldValue('POWER'), ni);
          xml += textEl('Brake', block.getFieldValue('BRAKE'), ni);
          xml += textEl('LocoBrake', block.getFieldValue('LOCO_BRAKE'), ni);
          xml += textEl('Reverser', block.getFieldValue('REVERSER'), ni);
          xml += ind(n) + '</NotchDescriptions>\n';
          break;

        case 'driver_body':
          xml += ind(n) + '<DriverBody>\n';
          xml += numEl('ShoulderHeight', block.getFieldValue('SHOULDER_HEIGHT'), ni);
          xml += numEl('HeadHeight', block.getFieldValue('HEAD_HEIGHT'), ni);
          xml += ind(n) + '</DriverBody>\n';
          break;

        default:
          console.warn('Unknown block type in generator: ' + block.type);
      }

      return xml;
    }


    // XML Import


    function importFromXmlText(xmlText) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(xmlText, 'text/xml');
      var parseError = doc.querySelector('parsererror');
      if (parseError) {
        showError('XML Parse Error', parseError.textContent.substring(0, 500));
        return false;
      }
      var trainEl = doc.documentElement;
      if (!trainEl || trainEl.tagName !== 'Train') {
        showError('Invalid Root', 'Root element must be <Train>, found <' + (trainEl ? trainEl.tagName : 'none') + '>');
        return false;
      }

      Blockly.Events.disable();
      try {
        workspace.clear();
        var trainBlock = workspace.newBlock('train_root');
        importTrainElement(trainBlock, trainEl);
        // Init all blocks
        var allBlocks = workspace.getAllBlocks(false);
        for (var i = 0; i < allBlocks.length; i++) {
          if (!allBlocks[i].isSvgInitialized_) {
            try { allBlocks[i].initSvg(); } catch (e) { }
          }
        }
        workspace.render();
        Blockly.svgResize(workspace);
      } finally {
        Blockly.Events.enable();
      }
      updateOutput();
      return true;
    }

    function importTrainElement(block, el) {
      setNum(block, 'DRIVER_CAR', el, 'DriverCar');
      setText(block, 'DESCRIPTION', el, 'Description');
      setNum(block, 'HEADLIGHT_STATES', el, 'HeadlightStates');

      // Process children in order: Car, Coupler, Plugin, NotchDescriptions, DriverBody
      for (var i = 0; i < el.children.length; i++) {
        var child = el.children[i];
        var tagName = child.tagName;
        if (tagName === 'Car') {
          var carBlock = workspace.newBlock('car');
          if (child.children.length === 0 && child.textContent.trim() !== '') {
            carBlock.setFieldValue(child.textContent.trim(), 'FILE_PATH');
          } else {
            importCarElement(carBlock, child);
          }
          appendToStack(block, 'CARS', carBlock);
        } else if (tagName === 'Coupler') {
          var cBlock = workspace.newBlock('coupler');
          importCouplerElement(cBlock, child);
          appendToStack(block, 'CARS', cBlock);
        } else if (tagName === 'Plugin') {
          var pBlock = workspace.newBlock('plugin');
          importPluginElement(pBlock, child);
          appendToStack(block, 'PLUGIN', pBlock);
        } else if (tagName === 'NotchDescriptions') {
          var nBlock = workspace.newBlock('notch_descriptions');
          importNotchDescriptionsElement(nBlock, child);
          appendToStack(block, 'NOTCHES', nBlock);
        } else if (tagName === 'DriverBody') {
          var dbBlock = workspace.newBlock('driver_body');
          importDriverBodyElement(dbBlock, child);
          appendToStack(block, 'DRIVER_BODY', dbBlock);
        }
      }
    }

    function importCarElement(block, el) {
      function addPropBlock(type, setupFn) {
        var pBlock = workspace.newBlock(type);
        setupFn(pBlock);
        appendToStack(block, 'PROPERTIES', pBlock);
      }

      var lenEl = getChild(el, 'Length');
      if (lenEl) addPropBlock('car_length', function(b) { b.setFieldValue(lenEl.textContent.trim(), 'VALUE'); });

      var widthEl = getChild(el, 'Width');
      if (widthEl) addPropBlock('car_width', function(b) { b.setFieldValue(widthEl.textContent.trim(), 'VALUE'); });

      var heightEl = getChild(el, 'Height');
      if (heightEl) addPropBlock('car_height', function(b) { b.setFieldValue(heightEl.textContent.trim(), 'VALUE'); });

      var cogEl = getChild(el, 'CenterOfGravityHeight');
      if (cogEl) addPropBlock('car_center_of_gravity', function(b) { b.setFieldValue(cogEl.textContent.trim(), 'VALUE'); });

      var expEl = getChild(el, 'ExposedFrontalArea');
      var unexpEl = getChild(el, 'UnexposedFrontalArea');
      if (expEl || unexpEl) {
        addPropBlock('car_frontal_area', function(b) {
          b.setFieldValue(expEl ? expEl.textContent.trim() : '', 'EXPOSED');
          b.setFieldValue(unexpEl ? unexpEl.textContent.trim() : '', 'UNEXPOSED');
        });
      }

      var massEl = getChild(el, 'Mass');
      if (massEl) addPropBlock('car_mass', function(b) { b.setFieldValue(massEl.textContent.trim(), 'VALUE'); });

      var motorEl = getChild(el, 'MotorCar');
      if (motorEl) {
        addPropBlock('car_motor_car', function(b) {
          var v = motorEl.textContent.trim().toLowerCase();
          b.setFieldValue(v === 'true' || v === '1' ? 'TRUE' : 'FALSE', 'VALUE');
        });
      }

      var frontAxleEl = getChild(el, 'FrontAxle');
      var rearAxleEl = getChild(el, 'RearAxle');
      if (frontAxleEl || rearAxleEl) {
        addPropBlock('car_axles', function(b) {

    // XML syntax highlighter — produces HTML spans for the output panel
    function highlightXml(xml) {
      // Escape first
      var esc = xml.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // Declaration
      esc = esc.replace(/^(&lt;\?xml[^]*?\?&gt;)/, '<span class="xml-decl">$1</span>');
      // Comments
      esc = esc.replace(/(&lt;!--[^]*?--&gt;)/g, '<span class="xml-comment">$1</span>');
      // Tags (opening, closing, self-closing)
      esc = esc.replace(/(&lt;\/?)([a-zA-Z_][a-zA-Z0-9_]*)([^&]*?)(\/?&gt;)/g,
        function (m, p1, p2, p3, p4) {
          return '<span class="xml-tag">' + p1 + p2 + '</span>' + p3 + '<span class="xml-tag">' + p4 + '</span>';
        });
      return esc;
    }

    function updateOutput() {
      var topBlocks = workspace.getTopBlocks(false);
      var trainBlock = null;
      for (var i = 0; i < topBlocks.length; i++) {
        if (topBlocks[i].type === 'train_root') { trainBlock = topBlocks[i]; break; }
      }
      var output = '';
      var statusClass = 'ok';
      var statusMsg = 'Ready';
      if (trainBlock) {
        try {
          output = generateXml(trainBlock, 0);
          statusMsg = 'XML generated successfully';
        } catch (e) {
          output = 'Error generating XML:\n' + e.message;
          statusClass = 'error';
          statusMsg = 'Error: ' + e.message;
        }
      } else {
        output = '<!-- No Train root block found. Drag one from the Train category. -->';
        statusMsg = 'No Train root block';
        statusClass = 'error';
      }
      // Store raw text for copy/download, show highlighted HTML
      document.getElementById('xmlOutput').dataset.raw = output;
      document.getElementById('xmlOutput').innerHTML = highlightXml(output);
      var statusEl = document.getElementById('statusText');
      statusEl.textContent = statusMsg;
      statusEl.className = statusClass;
      // Block count
      var count = workspace.getAllBlocks(false).length;
      document.getElementById('blockCount').textContent = count + ' blocks';
    }

    function downloadXml() {
      var xml = document.getElementById('xmlOutput').dataset.raw || '';
      if (!xml || xml.startsWith('<!--')) {

        return;
      }
      var blob = new Blob([xml], { type: 'text/xml;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'train.xml';

      setTimeout(function () { URL.revokeObjectURL(url); }, 100);
    }

    function copyXml() {
      var xml = document.getElementById('xmlOutput').dataset.raw || '';
      if (!xml) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(xml).then(function () {
          flashStatus('Copied to clipboard!');
        }).catch(function () {
          fallbackCopy(xml);
        });
      } else {
        fallbackCopy(xml);
      }
    }

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); flashStatus('Copied to clipboard!'); }
      catch (e) { showError('Copy Failed', 'Could not copy to clipboard.'); }
      document.body.removeChild(ta);
    }

      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (ev) {
        var success = importFromXmlText(ev.target.result);
        if (success) flashStatus('Imported ' + file.name);
      };
      reader.onerror = function () {
        showError('Read Error', 'Could not read the file.');
      };
      reader.readAsText(file);
      e.target.value = ''; // reset so same file can be re-imported
    });

    document.getElementById('exportBtn').addEventListener('click', downloadXml);
    document.getElementById('downloadBtn2').addEventListener('click', downloadXml);
    document.getElementById('copyBtn').addEventListener('click', copyXml);
    document.getElementById('copyBtn2').addEventListener('click', copyXml);

    document.getElementById('clearBtn').addEventListener('click', function () {
      if (!confirm('Clear the entire workspace? This cannot be undone.')) return;
      Blockly.Events.disable();
      workspace.clear();
      var rb = workspace.newBlock('train_root');
      rb.initSvg();
      rb.render();
      workspace.render();
      Blockly.Events.enable();
      updateOutput();
    });

    document.getElementById('sampleBtn').addEventListener('click', function () {
      importFromXmlText(SAMPLE_XML);
      flashStatus('Sample loaded');
    });

    //  Resizer for the split between Blockly and output panel 

    (function setupResizer() {
      var resizer = document.getElementById('resizer');
      var panel = document.getElementById('outputPanel');
      var container = document.querySelector('main');
      var dragging = false;

      resizer.addEventListener('mousedown', function (e) {
        dragging = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        var rect = container.getBoundingClientRect();
        var panelWidth = rect.right - e.clientX;
        if (panelWidth < 280) panelWidth = 280;
        if (panelWidth > rect.width - 300) panelWidth = rect.width - 300;
        panel.style.width = panelWidth + 'px';
        Blockly.svgResize(workspace);
      });

      document.addEventListener('mouseup', function () {
        if (dragging) {
          dragging = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          Blockly.svgResize(workspace);
        }
      });
    })();

    // Initial output
    updateOutput();

  </script>
</body>

</html>
